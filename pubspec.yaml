name: gubat_messages
description: A spam-filtering SMS app
publish_to: 'none'
version: 1.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # SMS handling
  another_telephony: ^0.4.1
  
  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Firebase
  firebase_core: ^4.2.1
  cloud_firestore: ^6.1.0
  
  # Permissions
  permission_handler: ^12.0.1
  
  # HTTP requests
  http: ^1.2.2

  # Encryption
  cryptography_plus: ^2.7.1
  cryptography_flutter_plus: ^2.3.4

  # Environment variables
  flutter_dotenv: ^5.1.0

  # File system
  path_provider: ^2.1.3

  # UI
  cupertino_icons: ^1.0.8

  # Contacts
  fast_contacts: ^5.0.1

  # Local notifications
  flutter_local_notifications: ^19.5.0
  flutter_local_notifications_platform_interface: ^9.1.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  analyzer: ^6.4.1
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - .env

flutter_launcher_icons:
  android: true
  image_path: "launcher_icon.png"
